name: Build Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow
          pip install ".[windows]"

      - name: Build EXE
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name mitten `
            --icon mitten/assets/mitten.png `
            --add-data "mitten/assets;mitten/assets" `
            --collect-submodules mitten `
            mitten/__main__.py

      - name: Upload EXE to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mitten.exe
          tag_name: v0.3.7-windows
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
